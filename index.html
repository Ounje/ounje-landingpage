<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/ounje-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OunjeFood | Order Fast. Eat Fresh. Spend Less</title>

  <!-- Core SEO Meta Tags -->
  <meta name="description"
    content="OunjFood is Lagos's leading local food delivery platform. Order fresh, hot local meals, swallowing soups, grills, and drinks straight to your doorstep at affordable rates." />

  <meta property="og:title" content="OunjeFood - Fresh Local Nigerian Food Delivered Fast" />

    content="Craving local Nigerian food? Order fresh, hot meals from top Bukás and kitchens in Lagos. Fast delivery, affordable prices." />

  <meta property="og:site_name" content="OunjeFood" />
